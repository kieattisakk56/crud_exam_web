<div class="min-h-[80vh] flex items-center justify-center p-4 font-sans bg-slate-50">
  <!-- IT 02-1: Login Page -->
  @if (viewMode === 'login') {
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 p-8 animate-fade-in-up">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-slate-800 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-teal-500">
          IT 02-1
        </h2>
        <p class="text-slate-500 text-sm mt-1">Sign in to your account</p>
      </div>
      @if (errorMessage) {
        <div class="mb-4 p-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-sm text-center">
          {{ errorMessage }}
        </div>
      }
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">User</label>
          <input type="text" [(ngModel)]="username" placeholder="Enter username"
            class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all duration-200" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password</label>
          <input type="password" [(ngModel)]="password" placeholder="Enter password"
            class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all duration-200" />
        </div>
        <button (click)="login()"
          class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 transition-all duration-300 mt-2">
          ลงชื่อเข้าใช้งาน
        </button>
      </div>
      <div class="mt-8 text-center">
        <button (click)="showRegister()" class="text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline transition-colors">
          สมัครสมาชิก
        </button>
      </div>
    </div>
  }

  <!-- IT 02-2: Register Page -->
  @if (viewMode === 'register') {
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 p-8 animate-fade-in-up">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-slate-800 bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-500">
          IT 02-2
        </h2>
        <p class="text-slate-500 text-sm mt-1">Create a new account</p>
      </div>
      @if (errorMessage) {
        <div class="mb-4 p-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-sm text-center">
          {{ errorMessage }}
        </div>
      }
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">User</label>
          <input type="text" [(ngModel)]="username" placeholder="Choose a username"
            class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all duration-200" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password</label>
          <input type="password" [(ngModel)]="password" placeholder="Create password"
            class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all duration-200" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm your password"
            class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all duration-200" />
        </div>
        <button (click)="register()"
          class="w-full bg-slate-100 text-slate-800 hover:bg-slate-200 border border-slate-300 font-semibold py-3 rounded-xl transition-all duration-200 mt-2">
          สมัครสมาชิก
        </button>
        <button (click)="showLogin()"
          class="w-full mt-2 text-sm text-slate-500 hover:text-slate-700 transition-colors">
          กลับไปหน้าลงชื่อเข้าใช้งาน
        </button>
      </div>
    </div>
  }

  <!-- IT 02-3: Welcome Page -->
  @if (viewMode === 'welcome') {
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 p-10 text-center animate-fade-in-up">
      <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h2 class="text-xl font-semibold text-slate-400 mb-2">IT 02-3</h2>
      <p class="text-2xl font-bold text-slate-800 mb-8">
        Welcome User : <span class="text-blue-600">{{ welcomeUser }}</span>
      </p>
      <button (click)="logout()"
        class="bg-rose-50 text-rose-600 hover:bg-rose-100 hover:text-rose-700 font-medium px-8 py-2.5 rounded-full transition-colors duration-200">
        Logout
      </button>
    </div>
  }

  <style>
    @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in-up {
  animation: fadeInUp 0.4s ease-out forwards;
}
</style>
</div>
