<div class="min-h-[80vh] flex items-center justify-center p-4 font-sans bg-slate-50">

  <!-- IT 05-1: Home Screen -->
  @if (viewMode === 'home') {
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden animate-fade-in-up">
      <div class="bg-emerald-500 text-white text-center py-3 font-semibold tracking-wide">
        IT 05-1
      </div>
      <div class="p-10 flex flex-col items-center justify-center space-y-6">
        <button (click)="getTicket()" class="bg-blue-500 hover:bg-blue-600 active:scale-95 text-white text-4xl font-bold py-12 px-16 rounded-2xl shadow-lg shadow-blue-500/40 transition-all duration-200">
          รับบัตรคิว
        </button>
        <button (click)="clearQueue()" class="bg-slate-300 hover:bg-slate-400 text-slate-700 font-semibold py-3 px-12 rounded-xl transition-colors mt-8">
          ล้างคิว
        </button>
      </div>
    </div>
  }

  <!-- IT 05-2: Ticket Screen -->
  @if (viewMode === 'ticket') {
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden animate-fade-in-up">
      <div class="bg-emerald-500 text-white text-center py-3 font-semibold tracking-wide">
        IT 05-2
      </div>
      <div class="p-12 flex flex-col items-center justify-center text-center">
        <h3 class="text-xl font-bold text-slate-700 mb-6">หมายเลขคิว</h3>
        <div class="text-9xl font-black text-slate-800 tracking-tighter mb-8">
          {{ displayedQueue }}
        </div>
        <p class="text-slate-500 text-sm mb-10">วันที่ : {{ getCurrentDateTime() }}</p>
        <button (click)="goHome()" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-8 rounded-xl shadow-md transition-colors">
          กลับไปหน้ารับบัตรคิว
        </button>
      </div>
    </div>
  }

  <!-- IT 05-3: Clear Screen -->
  @if (viewMode === 'clear') {
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden animate-fade-in-up">
      <div class="bg-emerald-500 text-white text-center py-3 font-semibold tracking-wide">
        IT 05-3
      </div>
      <div class="p-12 flex flex-col items-center justify-center text-center">
        <div class="bg-blue-500 text-white font-semibold py-2 px-8 rounded-lg mb-6">
          ล้างคิว
        </div>
        <h3 class="text-lg font-bold text-slate-700 mb-4">หมายเลขคิวปัจจุบัน</h3>
        <div class="text-8xl font-black text-slate-800 tracking-tighter mb-10">
          {{ displayedQueue }}
        </div>
        <button (click)="goHome()" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-8 rounded-xl shadow-md transition-colors">
          กลับไปหน้ารับบัตรคิว
        </button>
      </div>
    </div>
  }

  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
  </style>
</div>
